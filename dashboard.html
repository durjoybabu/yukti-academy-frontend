<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard | Yukti Academy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">
            <div class="logo-mark" aria-label="Yukti Academy logo">YA</div>
            <div>Yukti <span>Academy</span></div>
        </div>
        <nav>
            <ul>
                <li><a href="/dashboard.html">Dashboard</a></li>
                <li><a href="/">Home</a></li>
            </ul>
        </nav>
    </header>

    <section class="dashboard-section">
        <div class="dashboard-card">
            <h2>Welcome Back, Student!</h2>
            <p>Your personalized learning dashboard is ready.</p>
            <div class="dashboard-stats">
                <div class="stat-box">
                    <h3>3</h3>
                    <p>Enrolled Courses</p>
                </div>
                <div class="stat-box">
                    <h3>85%</h3>
                    <p>Progress</p>
                </div>
                <div class="stat-box">
                    <h3>2</h3>
                    <p>Assignments</p>
                </div>
            </div>
        </div>
    </section>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Sign Up | Yukti Academy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">
            <div class="logo-mark" aria-label="Yukti Academy logo">YA</div>
            <div>Yukti <span>Academy</span></div>
        </div>
        <nav>
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/signup.html">Sign Up</a></li>
            </ul>
        </nav>
    </header>

    <section class="auth-section">
        <div class="auth-card">
            <h2>Create Student Account</h2>
            <p>Join Yukti Academy and start learning today.</p>
            <form id="signupForm">
                <input type="text" id="fullName" placeholder="Full Name" required>
                <input type="email" id="email" placeholder="Email Address" required>
                <input type="password" id="password" placeholder="Password" required>
                <input type="text" id="phone" placeholder="Phone Number">
                <select id="courseInterest" required>
                    <option value="">Select your preferred course</option>
                </select>
                <button type="submit">Sign Up</button>
            </form>
            <p id="signupMessage" class="form-message"></p>
        </div>
    </section>

    <script>
        async function loadCourses() {
            const res = await fetch('/api/courses');
            const courses = await res.json();
            const courseSelect = document.getElementById('courseInterest');
            
            courses.forEach(course => {
                const option = document.createElement('option');
                option.value = course.title;
                option.textContent = course.title;
                courseSelect.appendChild(option);
            });
        }

        document.getElementById('signupForm').addEventListener('submit', async (event) => {
            event.preventDefault();
            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const phone = document.getElementById('phone').value;
            const courseInterest = document.getElementById('courseInterest').value;
            const message = document.getElementById('signupMessage');

            const res = await fetch('/api/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ fullName, email, password, phone, courseInterest })
            });

            const data = await res.json();
            message.textContent = data.message;
            message.style.display = 'block';
            document.getElementById('signupForm').reset();
        });

        loadCourses();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yukti Academy | Learn Logic & Skills</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">
            <div class="logo-mark" aria-label="Yukti Academy logo">YA</div>
            <div>Yukti <span>Academy</span></div>
        </div>
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#courses">All Courses</a></li>
                <li><a href="/signup.html">Sign Up</a></li>
                <li><a href="/login.html">Login</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero" id="home">
        <div class="hero-content">
            <h1>Welcome to Yukti Academy</h1>
            <p>Empower your future with logic, technology, and industry-ready skills.</p>
            <a href="#courses" class="btn-primary">Explore Courses</a>
        </div>
    </section>

    <section class="courses-container" id="courses">
        <h2>Our Top Courses</h2>
        <div class="course-grid" id="courseGrid"></div>
    </section>

    <section class="enroll-section" id="enroll">
        <div class="enroll-card">
            <h2>Student Enrollment</h2>
            <form id="enrollForm">
                <input type="text" id="name" placeholder="Your name" required>
                <input type="email" id="email" placeholder="Your email" required>
                <select id="courseSelect" required></select>
                <button type="submit">Enroll Now</button>
            </form>
            <p id="formMessage" class="form-message"></p>
        </div>
    </section>

    <script>
        async function loadCourses() {
            const res = await fetch('/api/courses');
            const courses = await res.json();
            const courseGrid = document.getElementById('courseGrid');
            const courseSelect = document.getElementById('courseSelect');

            courseGrid.innerHTML = courses.map(course => `
                <div class="course-card">
                    <div class="course-thumb">📚</div>
                    <div class="course-info">
                        <h3>${course.title}</h3>
                        <p>${course.description}</p>
                        <div class="card-footer">
                            <span class="price">${course.price}</span>
                            <span class="duration">${course.duration}</span>
                        </div>
                    </div>
                </div>
            `).join('');

            courseSelect.innerHTML = courses.map(course => `<option value="${course.title}">${course.title}</option>`).join('');
        }

        document.getElementById('enrollForm').addEventListener('submit', async (event) => {
            event.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const course = document.getElementById('courseSelect').value;
            const message = document.getElementById('formMessage');

            const res = await fetch('/api/enroll', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, course })
            });

            const data = await res.json();
            message.textContent = data.message;
            message.style.display = 'block';
            document.getElementById('enrollForm').reset();
        });

        loadCourses();
    </script>
</body>
</html>
